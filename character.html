<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>食刻｜Character</title>
  <link rel="icon" type="image/png" href="images/便當.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#0e0c0a;
      --text:#f2ede8;
      --accent:#e0a37a;
      --accent2:#6f3b25;
    }

    *{ box-sizing:border-box; margin:0; padding:0; }

    body{
      font-family:'Noto Sans TC', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.95;
      overflow-x: hidden;
      cursor: none;
    }

    img{ width:100%; display:block; }

    /* 導覽列（跟 Film/Story 同款） */
    .nav{
      position: sticky;
      top:0;
      z-index:100;
      display:flex;
      justify-content:center;
      gap:2.5rem;
      padding:1.2rem 0;
      background: rgba(20,16,13,.85);
      backdrop-filter: blur(6px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .nav a{
      color: var(--text);
      font-weight:700;
      letter-spacing:.1em;
      padding:.4rem .9rem;
      border-radius:999px;
      text-decoration:none;
      transition:.3s;
    }
    .nav a:hover,
    .nav a.active{ background: var(--accent2); }

    /* Header */
    .char-hero{
  min-height: 64vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding: 5rem 2rem 4rem;
  position: relative;
  overflow:hidden;
  background:
    linear-gradient(rgba(14,12,10,0.65), rgba(14,12,10,0.95)),
    url("images/poster.jpg") center / cover no-repeat;
}


    .char-hero::after{
      content:"";
      position:absolute;
      inset:0;
      background: radial-gradient(900px 600px at 50% 35%, rgba(255,190,120,.10), transparent 60%);
      animation: breathe 6.8s ease-in-out infinite;
      pointer-events:none;
    }

    @keyframes breathe{
      0%,100%{ opacity:.8; }
      50%{ opacity:1; }
    }

    .char-hero > div{ position:relative; z-index:2; max-width: 920px; }

    .char-hero h1{
      font-size: 3.2rem;
      letter-spacing: .25em;
      margin-bottom: 1.2rem;
    }

    .char-hero p{
      font-size: 1.1rem;
      color: #d6c7bb;
      letter-spacing: .08em;
    }

    /* 內容容器 */
    .wrap{
      max-width: 980px;
      margin: auto;
      padding: 5rem 2rem 6.5rem;
      display:flex;
      flex-direction: column;
      gap: 3.2rem;
    }

    /* 角色卡：左右分欄 */
    .card{
      display:grid;
      grid-template-columns: 1fr 1.1fr;
      gap: 2.6rem;
      align-items: center;
      padding: 1.2rem;
      border-radius: 22px;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 30px 60px rgba(0,0,0,0.35);
      position: relative;
      overflow:hidden;
    }

    .card::before{
      content:"";
      position:absolute;
      inset:0;
      background: radial-gradient(900px 600px at 25% 20%, rgba(255,190,120,0.08), transparent 60%);
      pointer-events:none;
    }

    .card.reverse{
      grid-template-columns: 1.1fr 1fr;
    }

    /* 圖片框：燭光 hover */
    .portrait{
      border-radius: 18px;
      overflow:hidden;
      box-shadow: 0 30px 60px rgba(0,0,0,.6);
      position: relative;
      transform: translateZ(0);
    }

    .portrait::after{
      content:"";
      position:absolute;
      inset:-30%;
      background: radial-gradient(circle at 30% 30%, rgba(255,210,140,0.18), transparent 60%);
      filter: blur(14px);
      opacity: 0;
      transition: opacity .25s ease;
      pointer-events:none;
      mix-blend-mode: screen;
    }

    .portrait:hover::after{
      opacity: 1;
      animation: flicker 0.95s infinite;
    }

    @keyframes flicker{
      0%{ transform: translate(0,0) scale(1); opacity:.55; }
      25%{ transform: translate(8px,-5px) scale(1.02); opacity:.40; }
      55%{ transform: translate(-6px,4px) scale(1.01); opacity:.62; }
      100%{ transform: translate(3px,7px) scale(1.03); opacity:.45; }
    }

    /* 文字區 */
    .meta{ position:relative; z-index:2; }

    .name{
      font-size: 2.2rem;
      color: var(--accent);
      letter-spacing: .12em;
      margin-bottom: .6rem;
    }

    .tag{
      display:flex;
      gap: .6rem;
      flex-wrap: wrap;
      margin-bottom: 1.2rem;
      color: #cbbdb3;
      font-size: .98rem;
      letter-spacing: .06em;
    }

    .pill{
      padding: .32rem .7rem;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(0,0,0,0.18);
    }

    .desc{
      color:#e6ded7;
      line-height: 2.05;
      white-space: pre-line;
      font-size: 1.05rem;
    }

    /* 淡入動畫（跟 Film 同款） */
    .fade-up{
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 1.1s ease, transform 1.1s ease;
    }
    .fade-up.show{
      opacity: 1;
      transform: translateY(0);
    }

    /* 光暈 */
    #light{
      position: fixed;
      left:0; top:0;
      width: 720px;
      height: 720px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events:none;
      z-index: 200;
      background: radial-gradient(circle, rgba(255,206,145,0.22), rgba(255,140,60,0.08) 35%, rgba(0,0,0,0) 72%);
      mix-blend-mode: screen;
      opacity: .95;
      filter: blur(2px);
    }
    #light::after{
      content:"";
      position:absolute;
      left:50%; top:50%;
      width: 18px; height: 18px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.85), rgba(255,190,120,0.35), transparent 70%);
    }

    @media (max-width: 980px){
      .card, .card.reverse{ grid-template-columns: 1fr; }
    }

    @media (max-width: 768px){
      body{ cursor:auto; }
      #light{ display:none; }
      .char-hero h1{ font-size: 2.2rem; }
    }

    @media (prefers-reduced-motion: reduce){
      *{ animation:none !important; transition:none !important; }
      body{ cursor:auto; }
      #light{ display:none; }
    }
  </style>
</head>

<body>
  <nav class="nav">
    <a href="index.html">Home</a>
    <a href="story-about.html">Story</a>
    <a href="character.html" class="active">Character</a>
    <a href="film.html">Film</a>
  </nav>

  <section class="char-hero fade-up">
    <div>
      <h1><img src="images/BENTO WORD.png" style="width: 100%; max-width: 300px; height: auto;" alt="食刻"></h1>
      <p>角色設計 | Character Design</p>
    </div>
  </section>

  <main class="wrap">

    <!-- 阿成 -->
    <section class="card fade-up">
      <div class="portrait">
        <img src="images/character1.jpeg" alt="阿成">
      </div>

      <div class="meta">
        <div class="name">阿成</div>
        <div class="tag">
          <span class="pill">獨居老人</span>
          <span class="pill">父親</span>
        </div>
        <div class="desc">固執而寡言的老人，習慣將情緒藏在日常動作之中。
女兒離家工作後，廚房成了他與過去對話的唯一空間。
他反覆練習那份親子便當，並非為了完美的味道，
而是想確認自己是否仍被記得。</div>
      </div>
    </section>

    <!-- 女兒 -->
    <section class="card reverse fade-up">
      <div class="meta">
        <div class="name">女兒</div>
        <div class="tag">
          <span class="pill">上班族</span>
          <span class="pill">女兒</span>
        </div>
        <div class="desc">長期離家工作的女性，在城市中過著規律而忙碌的生活。
她習慣將關心藏在簡短的問候裡，
卻在一次次準備料理的過程中，
意識到自己與父親之間逐漸拉開的距離。</div>
      </div>

      <div class="portrait">
        <img src="images/character2.jpeg" alt="女兒">
      </div>
    </section>

  </main>

  <div id="light" aria-hidden="true"></div>

  <script>
    // 滾動淡入
    const fadeElements = document.querySelectorAll('.fade-up');
    const observer = new IntersectionObserver(
      entries => {
        entries.forEach(entry => {
          if (entry.isIntersecting) entry.target.classList.add('show');
        });
      },
      { threshold: 0.2 }
    );
    fadeElements.forEach(el => observer.observe(el));

    // 光暈：跟手版本（跟你 film 一致的手感）
    const light = document.getElementById("light");
    let mx = window.innerWidth * 0.5, my = window.innerHeight * 0.5;
    let lx = mx, ly = my;
    const lerp = (a, b, t) => a + (b - a) * t;

    window.addEventListener("mousemove", (e) => {
      mx = e.clientX;
      my = e.clientY;
    }, { passive:true });

    function tick(){
      const dx = mx - lx;
      const dy = my - ly;
      const dist = Math.hypot(dx, dy);
      const t = Math.min(0.55, 0.22 + dist / 1200);

      lx = lerp(lx, mx, t);
      ly = lerp(ly, my, t);

      light.style.left = lx + "px";
      light.style.top = ly + "px";
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  </script>
</body>
</html>
