<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>食刻｜HOME</title>
  <link rel="icon" type="image/png" href="images/便當.png">

  <!-- 字體 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --warm: rgb(212, 119, 19);
      --text: rgba(255,255,255,0.92);
    }

    *{ box-sizing:border-box; margin:0; padding:0; }

    body, html {
      height: 100%;
      font-family: 'Noto Sans TC', sans-serif;
      overflow: hidden;
      background:#070605;
      cursor: none;
    }

    .hero {
      position: relative;
      height: 100vh;
      background: url('images/poster.jpg') no-repeat center center/cover;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: var(--text);
      text-shadow: 2px 2px 10px rgba(0,0,0,0.6);
      overflow: hidden;
      animation: backgroundZoom 30s infinite alternate linear;
    }

    @keyframes backgroundZoom {
      0% { transform: scale(1); }
      100% { transform: scale(1.06); }
    }

    .hero::after{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(1200px 800px at 50% 40%, rgba(255,190,120,0.08), transparent 60%),
        linear-gradient(to bottom, rgba(0,0,0,0.25), rgba(0,0,0,0.65));
      animation: breathe 6.5s ease-in-out infinite;
      pointer-events:none;
    }
    @keyframes breathe{
      0%,100%{ opacity: .85; }
      50%{ opacity: 1; }
    }

    .hero h1, .hero p {
      opacity: 0;
      animation: fadeIn 2s forwards;
      position: relative;
      z-index: 2;
    }

    .hero h1 {
      font-size: 6vw;
      margin: 0;
      letter-spacing: 0.2em;
      animation-delay: 0.5s;
    }

    .hero p {
      font-size: 2vw;
      margin: 20px 0 50px 0;
      animation-delay: 1.2s;
    }

    @keyframes fadeIn { to { opacity: 1; } }

    .buttons {
      display: flex;
      gap: 60px;
      opacity: 0;
      animation: fadeIn 2s forwards;
      animation-delay: 2s;
      position: relative;
      z-index: 2;
    }

    .buttons a {
      text-decoration: none;
      color: white;
      padding: 18px 40px;
      border: 2px solid rgba(255,255,255,0.95);
      font-size: 1.2vw;
      border-radius: 12px;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow: 0 0 20px rgba(255,255,255,0.2);
      background: rgba(0,0,0,0.1);
      backdrop-filter: blur(4px);
      transition: .3s;
    }

    .buttons a:hover{
      background: white;
      color: var(--warm);
      transform: scale(1.12);
      box-shadow: 0 0 35px rgba(255,255,255,0.85);
    }

    #light{
      position: fixed;
      left:0; top:0;
      width:520px; height:520px;
      border-radius:50%;
      transform: translate(-50%,-50%);
      pointer-events:none;
      background: radial-gradient(circle, rgba(255,206,145,.28), rgba(255,140,60,.08) 35%, transparent 70%);
      mix-blend-mode: screen;
      z-index: 10;
    }

    @media(max-width:768px){
      body,html{ cursor:auto; }
      #light{ display:none; }
      .hero h1{ font-size:10vw; }
      .hero p{ font-size:4vw; }
      .buttons{ flex-direction:column; gap:22px; }
      .buttons a{ font-size:3.5vw; padding:12px 26px; }
    }
  </style>
</head>

<body>
  <div class="hero">
    <h1><img src="images/BENTO WORD(白).png" style="width: 100%; max-width: 400px; height: auto;" alt="食刻"></h1>
    <p>一段在料理中重逢的父女時光</p>
    <div class="buttons">
      <a class="en" href="story-about.html">Story</a>
      <a class="en" href="character.html">Character</a>
      <a class="en" href="film.html">Film</a>
    </div>
  </div>

  <div id="light"></div>

  <script>
    const light = document.getElementById("light");
    let mx=0,my=0,lx=0,ly=0;

    addEventListener("mousemove", e=>{
      mx=e.clientX; my=e.clientY;
    });

    function tick(){
      lx += (mx-lx)*0.35;
      ly += (my-ly)*0.35;
      light.style.left = lx+"px";
      light.style.top  = ly+"px";
      requestAnimationFrame(tick);
    }
    tick();
  </script>
</body>
</html>
